<svg xmlns='http://www.w3.org/2000/svg' width='375' height='812' viewBox='0 0 375 812'>
  <defs>
    <style>
      .bg { fill: #FFFFFF; }
      .header { fill: #1976D2; }
      .header-text { font-family: Arial; font-size: 14px; font-weight: bold; fill: #FFFFFF; }
      .label { font-family: Arial; font-size: 12px; fill: #333333; }
      .table-header { fill: #E0E0E0; font-family: Arial; font-size: 11px; font-weight: bold; }
      .table-row { fill: #FFFFFF; stroke: #EEEEEE; stroke-width: 1; }
      .table-row-highlight { fill: #FFFF99; stroke: #FF6B6B; stroke-width: 2; }
      .button { fill: #4CAF50; stroke: none; }
      .button-text { font-family: Arial; font-size: 13px; fill: #FFFFFF; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect class='bg' width='375' height='812'/>

  <!-- Header -->
  <rect class='header' width='375' height='70'/>
  <text class='header-text' x='20' y='35'>← Back</text>
  <text class='header-text' x='187.5' y='35' text-anchor='middle'>Paris Population History</text>
  <text class='label' x='20' y='60' fill='#FFFFFF' font-size='10'>1800-2020</text>

  <!-- Table Header -->
  <rect class='table-header' x='15' y='85' width='50' height='35'/>
  <text x='40' y='107' text-anchor='middle' font-family='Arial' font-size='11' font-weight='bold'>Year</text>
  
  <rect class='table-header' x='65' y='85' width='120' height='35'/>
  <text x='125' y='107' text-anchor='middle' font-family='Arial' font-size='11' font-weight='bold'>Population</text>
  
  <rect class='table-header' x='185' y='85' width='80' height='35'/>
  <text x='225' y='107' text-anchor='middle' font-family='Arial' font-size='11' font-weight='bold'>Certainty</text>
  
  <rect class='table-header' x='265' y='85' width='95' height='35'/>
  <text x='312.5' y='107' text-anchor='middle' font-family='Arial' font-size='11' font-weight='bold'>Source</text>

  <!-- Table Rows -->
  <!-- 1800 -->
  <rect class='table-row' x='15' y='120' width='345' height='28'/>
  <text class='label' x='25' y='139' font-size='11'>1800</text>
  <text class='label' x='75' y='139' font-size='11'>547,856</text>
  <text class='label' x='195' y='139' font-size='10'>Exact</text>
  <text class='label' x='275' y='139' font-size='10'>Census</text>

  <!-- 1832 (Highlighted) -->
  <rect class='table-row-highlight' x='15' y='148' width='345' height='28'/>
  <text class='label' x='25' y='167' font-size='11' font-weight='bold'>1832 *</text>
  <text class='label' x='75' y='167' font-size='11' font-weight='bold'>775,000</text>
  <text class='label' x='195' y='167' font-size='10' font-weight='bold'>Interpolated</text>
  <text class='label' x='275' y='167' font-size='10' font-weight='bold'>Estimate</text>

  <!-- 1850 -->
  <rect class='table-row' x='15' y='176' width='345' height='28'/>
  <text class='label' x='25' y='195' font-size='11'>1850</text>
  <text class='label' x='75' y='195' font-size='11'>1,053,262</text>
  <text class='label' x='195' y='195' font-size='10'>Exact</text>
  <text class='label' x='275' y='195' font-size='10'>Census</text>

  <!-- 1870 -->
  <rect class='table-row' x='15' y='204' width='345' height='28'/>
  <text class='label' x='25' y='223' font-size='11'>1870</text>
  <text class='label' x='75' y='223' font-size='11'>1,825,274</text>
  <text class='label' x='195' y='223' font-size='10'>Exact</text>
  <text class='label' x='275' y='223' font-size='10'>Census</text>

  <!-- 1890 -->
  <rect class='table-row' x='15' y='232' width='345' height='28'/>
  <text class='label' x='25' y='251' font-size='11'>1890</text>
  <text class='label' x='75' y='251' font-size='11'>2,270,515</text>
  <text class='label' x='195' y='251' font-size='10'>Exact</text>
  <text class='label' x='275' y='251' font-size='10'>Census</text>

  <!-- France Section Header -->
  <text class='label' x='25' y='285' font-size='12' font-weight='bold'>🇫🇷 FRANCE REGIONAL DATA</text>

  <!-- France Table Header -->
  <rect class='table-header' x='15' y='295' width='50' height='28'/>
  <text x='40' y='312' text-anchor='middle' font-family='Arial' font-size='10' font-weight='bold'>Year</text>
  
  <rect class='table-header' x='65' y='295' width='120' height='28'/>
  <text x='125' y='312' text-anchor='middle' font-family='Arial' font-size='10' font-weight='bold'>Population</text>
  
  <rect class='table-header' x='185' y='295' width='80' height='28'/>
  <text x='225' y='312' text-anchor='middle' font-family='Arial' font-size='10' font-weight='bold'>Certainty</text>
  
  <rect class='table-header' x='265' y='295' width='95' height='28'/>
  <text x='312.5' y='312' text-anchor='middle' font-family='Arial' font-size='10' font-weight='bold'>Source</text>

  <!-- France 1800 -->
  <rect class='table-row' x='15' y='323' width='345' height='25'/>
  <text class='label' x='25' y='340' font-size='11'>1800</text>
  <text class='label' x='75' y='340' font-size='11'>27,349,003</text>
  <text class='label' x='195' y='340' font-size='10'>Exact</text>

  <!-- France 1832 (Highlighted) -->
  <rect class='table-row-highlight' x='15' y='348' width='345' height='25'/>
  <text class='label' x='25' y='365' font-size='11' font-weight='bold'>1832 *</text>
  <text class='label' x='75' y='365' font-size='11' font-weight='bold'>32,569,000</text>
  <text class='label' x='195' y='365' font-size='10' font-weight='bold'>Interpolated</text>

  <!-- France 1850 -->
  <rect class='table-row' x='15' y='373' width='345' height='25'/>
  <text class='label' x='25' y='390' font-size='11'>1850</text>
  <text class='label' x='75' y='390' font-size='11'>36,449,000</text>
  <text class='label' x='195' y='390' font-size='10'>Exact</text>

  <!-- Footnote -->
  <text class='label' x='25' y='420' font-size='10' fill='#666'>* Asterisk = Interpolated from surrounding data</text>

  <!-- Scroll Indicator -->
  <text class='label' x='25' y='445' font-size='10' fill='#999'>↓ Scroll for more years (1900-2020)</text>

  <!-- Close Button -->
  <rect class='button' x='25' y='470' width='325' height='45' rx='4'/>
  <text class='button-text' x='187.5' y='497' text-anchor='middle'>Close Panel</text>

  <!-- Keyboard Hint -->
  <text class='label' x='25' y='540' font-size='10' fill='#999'>Press Escape to close</text>
</svg>
