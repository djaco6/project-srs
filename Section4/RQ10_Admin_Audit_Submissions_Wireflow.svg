<svg xmlns='http://www.w3.org/2000/svg' width='1400' height='750' viewBox='0 0 1400 750'>
  <defs>
    <style>
      .state-box { stroke: #333; stroke-width: 2; rx: 8; }
      .state-admin { fill: #FFE8E8; }
      .state-table { fill: #E8F0FF; }
      .state-detail { fill: #E8FFE8; }
      .state-error { fill: #FFCCCC; }
      .arrow { fill: none; stroke: #333; stroke-width: 2.5; marker-end: url(#arrowhead); }
      .arrow-error { fill: none; stroke: #CC0000; stroke-width: 2.5; marker-end: url(#arrowhead-error); stroke-dasharray: 5,5; }
      .arrow-label { font-family: Arial; font-size: 11px; fill: #333; font-weight: bold; }
      .state-title { font-family: Arial; font-size: 14px; font-weight: bold; fill: #000; }
      .state-content { font-family: Arial; font-size: 10px; fill: #333; }
    </style>
    <marker id='arrowhead' markerWidth='10' markerHeight='10' refX='9' refY='3' orient='auto'>
      <polygon points='0 0, 10 3, 0 6' fill='#333' />
    </marker>
    <marker id='arrowhead-error' markerWidth='10' markerHeight='10' refX='9' refY='3' orient='auto'>
      <polygon points='0 0, 10 3, 0 6' fill='#CC0000' />
    </marker>
  </defs>
  <rect class='state-box state-admin' x='30' y='50' width='280' height='180' rx='8'/>
  <text class='state-title' x='170' y='80' text-anchor='middle'>Admin Panel</text>
  <text class='state-content' x='40' y='105'>USER ROLE: Admin</text>
  <text class='state-content' x='40' y='125'>✓ Verified admin user</text>
  <text class='state-content' x='40' y='155'>NAVIGATION:</text>
  <text class='state-content' x='50' y='175'>• Submissions (Active)</text>
  <text class='state-content' x='50' y='195'>• Reference Data</text>
  <path class='arrow' d='M 310 140 Q 395 100 480 140'/>
  <text class='arrow-label' x='340' y='85'>USER ACTION:</text>
  <text class='arrow-label' x='340' y='103'>Click "Submissions"</text>
  <rect class='state-box state-table' x='480' y='50' width='460' height='180' rx='8'/>
  <text class='state-title' x='710' y='80' text-anchor='middle'>Paginated Submissions Table</text>
  <rect x='490' y='100' width='440' height='20' fill='#E0E0E0' stroke='#333' stroke-width='1'/>
  <text class='state-content' x='500' y='115' font-weight='bold'>User | Title | Date | Entities | Duration</text>
  <rect x='490' y='120' width='440' height='18' fill='#FFF' stroke='#CCC' stroke-width='1'/>
  <text class='state-content' x='500' y='134'>john_doe | History of Paris | 2026-03-25 | 12 | 2.3s</text>
  <rect x='490' y='138' width='440' height='18' fill='#FFF' stroke='#CCC' stroke-width='1'/>
  <text class='state-content' x='500' y='152'>jane_smith | 19th Century | 2026-03-24 | 8 | 1.9s</text>
  <rect x='490' y='156' width='440' height='18' fill='#FFF' stroke='#CCC' stroke-width='1'/>
  <text class='state-content' x='500' y='170'>bob_jones | Travel Records | 2026-03-20 | 15 | 3.1s</text>
  <text class='state-content' x='500' y='200'>Pagination: Page 1 of 5</text>
  <path class='arrow' d='M 710 230 Q 710 310 710 390'/>
  <text class='arrow-label' x='640' y='315'>USER ACTION:</text>
  <text class='arrow-label' x='640' y='333'>Click document row</text>
  <rect class='state-box state-detail' x='380' y='390' width='660' height='320' rx='8'/>
  <text class='state-title' x='710' y='420' text-anchor='middle'>Admin Reader View (Read-Only)</text>
  <rect x='390' y='440' width='640' height='30' fill='#E8E8E8' stroke='#CCC' stroke-width='1'/>
  <text class='state-content' x='400' y='460'>Submitter: john_doe | Date: 2026-03-25 | Duration: 2.3s | IP: 192.168.x.x</text>
  <rect x='390' y='480' width='310' height='130' fill='#FFFACD' stroke='#CCC' stroke-width='1'/>
  <text class='state-content' x='400' y='500'>TEXT CONTENT:</text>
  <text class='state-content' x='400' y='520'>Paris was conquered in 1832</text>
  <text class='state-content' x='400' y='540'>and dominated European...</text>
  <rect x='710' y='480' width='310' height='130' fill='#E8F0FF' stroke='#CCC' stroke-width='1'/>
  <text class='state-content' x='720' y='500'>ANNOTATION CARDS:</text>
  <text class='state-content' x='720' y='520'>Paris (1832)</text>
  <text class='state-content' x='720' y='535'>Method: NER</text>
  <text class='state-content' x='720' y='550'>Confidence: 0.98</text>
  <rect x='390' y='620' width='630' height='70' fill='#E8F0FF' stroke='#CCC' stroke-width='1'/>
  <text class='state-content' x='400' y='640'>EXTRACTION DETAILS:</text>
  <text class='state-content' x='400' y='658'>• Method: Named Entity Recognition (NER)</text>
  <text class='state-content' x='400' y='676'>• Confidence Score: 98% (High confidence)</text>
  <rect class='state-box state-error' x='30' y='390' width='320' height='320' rx='8'/>
  <text class='state-title' x='190' y='420' text-anchor='middle'>Access Denied (Non-Admin)</text>
  <text class='state-content' x='40' y='450'>USER ROLE: Regular User</text>
  <text class='state-content' x='40' y='470'>Attempts to access admin panel</text>
  <text class='state-content' x='40' y='505'>SYSTEM RESPONSE:</text>
  <text class='state-content' x='50' y='525'>Error: "Access Denied"</text>
  <text class='state-content' x='50' y='545'>"You do not have permission to</text>
  <text class='state-content' x='50' y='565'>access the admin panel."</text>
  <text class='state-content' x='40' y='600'>REDIRECT:</text>
  <text class='state-content' x='50' y='620'>User sent back to dashboard</text>
  <text class='state-content' x='50' y='640'>or login page</text>
  <text class='state-content' x='40' y='675'>LOG EVENT:</text>
  <text class='state-content' x='50' y='695'>Unauthorized access attempt</text>
  <path class='arrow-error' d='M 350 290 Q 300 340 190 390'/>
  <text class='arrow-label' x='270' y='330' fill='#CC0000'>Non-admin tries</text>
  <text class='arrow-label' x='270' y='348' fill='#CC0000'>to access</text>
  <rect x='580' y='710' width='140' height='30' fill='#4CAF50' stroke='#333' stroke-width='2' rx='4'/>
  <text class='state-content' x='650' y='730' text-anchor='middle' fill='white' font-weight='bold'>Back to Submissions</text>
</svg>
