<svg xmlns='http://www.w3.org/2000/svg' width='800' height='600' viewBox='0 0 800 600'>
  <defs>
    <style>
      .header { fill: #1976D2; }
      .header-text { font-family: Arial; font-size: 14px; font-weight: bold; fill: #FFFFFF; }
      .text-pane { fill: #FFFACD; stroke: #CCCCCC; stroke-width: 1; }
      .sidebar { fill: #E8F0FF; stroke: #CCCCCC; stroke-width: 1; }
      .button-collapse { fill: #F0F0F0; stroke: #999; stroke-width: 1; }
      .button-text { font-family: Arial; font-size: 12px; fill: #333; font-weight: bold; }
      .label { font-family: Arial; font-size: 11px; fill: #333; }
    </style>
  </defs>

  <!-- Split Screen State -->
  <text x='20' y='25' font-family='Arial' font-size='16' font-weight='bold'>Split Screen View</text>
  
  <!-- Header -->
  <rect class='header' x='10' y='40' width='380' height='50'/>
  <text class='header-text' x='30' y='72'>← Back | History of Paris</text>
  <rect class='button-collapse' x='345' y='52' width='40' height='30' rx='4'/>
  <text class='button-text' x='365' y='70' text-anchor='middle'>&lt;&lt;</text>

  <!-- Text Pane (70%) -->
  <rect class='text-pane' x='10' y='95' width='270' height='480' rx='4'/>
  <text class='label' x='20' y='115'>TEXT CONTENT (70%)</text>
  <text class='label' x='20' y='135' fill='#333'>In 1832, Paris underwent...</text>
  <text class='label' x='20' y='155' fill='#333'>The distance between</text>
  <text class='label' x='20' y='175' fill='#333'>Paris and Lyon was...</text>

  <!-- Sidebar (30%) -->
  <rect class='sidebar' x='290' y='95' width='100' height='480' rx='4'/>
  <text class='label' x='300' y='115'>SIDEBAR</text>
  <text class='label' x='300' y='140' font-size='10'>Paris</text>
  <text class='label' x='300' y='160' font-size='10'>Card 1</text>
  <text class='label' x='300' y='180' font-size='10'>Lyon</text>
  <text class='label' x='300' y='200' font-size='10'>Card 2</text>

  <!-- Arrow -->
  <line x1='410' y1='340' x2='450' y2='340' stroke='#000' stroke-width='2' marker-end='url(#arrowhead)'/>
  <defs>
    <marker id='arrowhead' markerWidth='10' markerHeight='10' refX='9' refY='3' orient='auto'>
      <polygon points='0 0, 10 3, 0 6' fill='#000'/>
    </marker>
  </defs>

  <!-- Full Width State -->
  <text x='420' y='25' font-family='Arial' font-size='16' font-weight='bold'>Full Width (Collapsed)</text>
  
  <!-- Header Full Width -->
  <rect class='header' x='410' y='40' width='380' height='50'/>
  <text class='header-text' x='430' y='72'>← Back | History of Paris</text>

  <!-- Text Pane (100%) -->
  <rect class='text-pane' x='410' y='95' width='370' height='480' rx='4'/>
  <text class='label' x='420' y='115'>TEXT CONTENT (100% width)</text>
  <text class='label' x='420' y='135' fill='#333'>In 1832, Paris underwent major changes.</text>
  <text class='label' x='420' y='155' fill='#333'>The distance between Paris and Lyon</text>
  <text class='label' x='420' y='175' fill='#333'>was approximately 463 kilometers,</text>
  <text class='label' x='420' y='195' fill='#333'>taking 14 days by horseback...</text>

  <!-- Expand Tab -->
  <rect class='button-collapse' x='775' y='290' width='15' height='100' rx='2'/>
  <text class='button-text' x='782.5' y='342' text-anchor='middle' font-size='14'>&gt;&gt;</text>
</svg>
