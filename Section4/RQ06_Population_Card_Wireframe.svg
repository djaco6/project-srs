<svg xmlns='http://www.w3.org/2000/svg' width='375' height='812' viewBox='0 0 375 812'>
  <defs>
    <style>
      .bg { fill: #FFFFFF; }
      .header { fill: #1976D2; }
      .header-text { font-family: Arial; font-size: 14px; font-weight: bold; fill: #FFFFFF; }
      .label { font-family: Arial; font-size: 12px; fill: #333333; }
      .card { fill: #FFFFFF; stroke: #1976D2; stroke-width: 2; }
      .card-title { font-family: Arial; font-size: 16px; font-weight: bold; fill: #1976D2; }
      .data-label { font-family: Arial; font-size: 11px; fill: #666; }
      .data-value { font-family: Arial; font-size: 14px; font-weight: bold; fill: #333; }
      .button { fill: #2196F3; stroke: none; }
      .button-text { font-family: Arial; font-size: 13px; fill: #FFFFFF; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect class='bg' width='375' height='812'/>

  <!-- Header -->
  <rect class='header' width='375' height='60'/>
  <text class='header-text' x='20' y='40'>Back</text>
  <text class='header-text' x='187.5' y='40' text-anchor='middle'>Population Data</text>

  <!-- Expanded Card -->
  <rect class='card' x='15' y='80' width='345' height='650' rx='8'/>
  
  <!-- Card Header -->
  <rect x='15' y='80' width='345' height='60' fill='#1976D2' rx='8'/>
  <text class='header-text' x='187.5' y='115' text-anchor='middle' font-size='18'>Paris (1832)</text>

  <!-- City Population Section -->
  <rect x='25' y='150' width='325' height='120' fill='#F9F9F9' stroke='#EEEEEE' stroke-width='1' rx='4'/>
  <text class='card-title' x='35' y='175' font-size='14'>City Population</text>
  <text class='data-label' x='35' y='200'>Paris in 1832</text>
  <text class='data-value' x='35' y='220'>775,000</text>
  <text class='data-label' x='35' y='240' font-size='10'>(Interpolated Estimate)</text>
  <text class='data-label' x='35' y='256' font-size='10'>Based on census trend data</text>

  <!-- Regional Population Section -->
  <rect x='25' y='285' width='325' height='120' fill='#F9F9F9' stroke='#EEEEEE' stroke-width='1' rx='4'/>
  <text class='card-title' x='35' y='310' font-size='14'>Regional Population</text>
  <text class='data-label' x='35' y='335'>France in 1832</text>
  <text class='data-value' x='35' y='355'>32.6 million</text>
  <text class='data-label' x='35' y='375' font-size='10'>(Interpolated Estimate)</text>

  <!-- Certainty Section -->
  <rect x='25' y='420' width='325' height='100' fill='#F9F9F9' stroke='#EEEEEE' stroke-width='1' rx='4'/>
  <text class='card-title' x='35' y='445' font-size='14'>Data Quality</text>
  <text class='data-label' x='35' y='465'>Certainty: Interpolated</text>
  <text class='data-label' x='35' y='485' font-size='10'>* = Estimated from surrounding data</text>
  <text class='data-label' x='35' y='505' font-size='10'>Source: Census records</text>

  <!-- View History Button -->
  <rect class='button' x='25' y='540' width='325' height='50' rx='4'/>
  <text class='button-text' x='187.5' y='570' text-anchor='middle'>View Full History</text>

  <!-- Close Button -->
  <rect x='25' y='610' width='325' height='45' fill='#F0F0F0' stroke='#CCCCCC' stroke-width='1' rx='4'/>
  <text class='label' x='187.5' y='637' text-anchor='middle' font-weight='bold'>Close</text>
</svg>
