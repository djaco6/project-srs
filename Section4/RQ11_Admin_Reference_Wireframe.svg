<svg xmlns='http://www.w3.org/2000/svg' width='375' height='812' viewBox='0 0 375 812'>
  <defs>
    <style>
      .bg { fill: #FFFFFF; }
      .header { fill: #D32F2F; }
      .header-text { font-family: Arial; font-size: 16px; font-weight: bold; fill: #FFFFFF; }
      .label { font-family: Arial; font-size: 12px; fill: #333333; }
      .search-box { fill: #FFFFFF; stroke: #1976D2; stroke-width: 2; }
      .table-header { fill: #E0E0E0; font-family: Arial; font-size: 10px; font-weight: bold; }
      .table-row { fill: #FFFFFF; stroke: #EEEEEE; stroke-width: 1; }
      .button { fill: #4CAF50; stroke: none; }
      .button-text { font-family: Arial; font-size: 13px; fill: #FFFFFF; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect class='bg' width='375' height='812'/>

  <!-- Admin Header -->
  <rect class='header' width='375' height='80'/>
  <text class='header-text' x='187.5' y='50' text-anchor='middle'>Admin Panel</text>
  <text x='20' y='72' font-family='Arial' font-size='12' fill='#FFFFFF'>Reference Data Manager</text>

  <!-- Tabs -->
  <rect x='0' y='80' width='187.5' height='40' fill='#F0F0F0'/>
  <text x='93.75' y='105' text-anchor='middle' class='label'>Submissions</text>
  <rect x='187.5' y='80' width='187.5' height='40' fill='#D32F2F'/>
  <text x='281.25' y='105' text-anchor='middle' font-family='Arial' font-size='12' font-weight='bold' fill='#FFFFFF'>Reference Data</text>

  <!-- Search Box -->
  <text x='20' y='150' font-family='Arial' font-size='14' font-weight='bold'>Search Population Data</text>
  <rect class='search-box' x='20' y='170' width='335' height='45' rx='4'/>
  <text x='30' y='200' class='label' fill='#999'>Type city or region name...</text>

  <!-- Search Button -->
  <rect class='button' x='20' y='230' width='335' height='40' rx='4'/>
  <text x='187.5' y='258' text-anchor='middle' class='button-text'>Search</text>

  <!-- Results Section -->
  <text x='20' y='300' font-family='Arial' font-size='13' font-weight='bold'>Results for Paris</text>
  <text class='label' x='20' y='320' fill='#666'>Found 125 records</text>

  <!-- Table Header -->
  <rect class='table-header' x='15' y='340' width='45' height='30'/>
  <text x='37.5' y='360' text-anchor='middle' font-size='10' font-weight='bold'>Year</text>

  <rect class='table-header' x='60' y='340' width='85' height='30'/>
  <text x='102.5' y='360' text-anchor='middle' font-size='10' font-weight='bold'>Population</text>

  <rect class='table-header' x='145' y='340' width='100' height='30'/>
  <text x='195' y='360' text-anchor='middle' font-size='10' font-weight='bold'>Coordinates</text>

  <rect class='table-header' x='245' y='340' width='115' height='30'/>
  <text x='302.5' y='360' text-anchor='middle' font-size='10' font-weight='bold'>Certainty</text>

  <!-- Data Rows -->
  <!-- 1750 -->
  <rect class='table-row' x='15' y='370' width='345' height='28'/>
  <text class='label' x='25' y='390' font-size='11'>1750</text>
  <text class='label' x='70' y='390' font-size='10'>560,000</text>
  <text class='label' x='155' y='390' font-size='9'>48.8/2.3</text>
  <text class='label' x='255' y='390' font-size='10'>Estimated</text>

  <!-- 1832 (Highlighted) -->
  <rect class='table-row' x='15' y='398' width='345' height='28' fill='#FFFF99' stroke='#FF6B6B' stroke-width='2'/>
  <text class='label' x='25' y='418' font-size='11' font-weight='bold'>1832 *</text>
  <text class='label' x='70' y='418' font-size='10' font-weight='bold'>775,000</text>
  <text class='label' x='155' y='418' font-size='9' font-weight='bold'>48.8/2.3</text>
  <text class='label' x='255' y='418' font-size='10' font-weight='bold'>Interpolated</text>

  <!-- 1850 -->
  <rect class='table-row' x='15' y='426' width='345' height='28'/>
  <text class='label' x='25' y='446' font-size='11'>1850</text>
  <text class='label' x='70' y='446' font-size='10'>1,053,262</text>
  <text class='label' x='155' y='446' font-size='9'>48.8/2.3</text>
  <text class='label' x='255' y='446' font-size='10'>Exact</text>

  <!-- 1870 -->
  <rect class='table-row' x='15' y='454' width='345' height='28'/>
  <text class='label' x='25' y='474' font-size='11'>1870</text>
  <text class='label' x='70' y='474' font-size='10'>1,825,274</text>
  <text class='label' x='155' y='474' font-size='9'>48.8/2.3</text>
  <text class='label' x='255' y='474' font-size='10'>Exact</text>

  <!-- Footnote -->
  <text class='label' x='20' y='510' font-size='10' fill='#666'>* Asterisk indicates interpolated value</text>

  <!-- Scroll Indicator -->
  <text class='label' x='20' y='535' font-size='10' fill='#999'>Scroll for more years</text>

  <!-- Mini Map Section -->
  <rect x='15' y='560' width='345' height='120' fill='#E8F4F8' stroke='#CCCCCC' stroke-width='1' rx='4'/>
  <text class='label' x='25' y='580' font-weight='bold'>Mini-Map View</text>
  <text class='label' x='25' y='605'>Paris location shown</text>
  <text class='label' x='25' y='625'>Coordinates: 48.8566°N, 2.3522°E</text>
  <text class='label' x='25' y='645'>Click to expand map</text>

  <!-- Close Button -->
  <rect class='button' x='25' y='700' width='325' height='45' rx='4'/>
  <text x='187.5' y='728' text-anchor='middle' class='button-text'>Close</text>
</svg>
