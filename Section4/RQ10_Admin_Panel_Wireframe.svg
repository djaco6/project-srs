<svg xmlns='http://www.w3.org/2000/svg' width='375' height='812' viewBox='0 0 375 812'>
  <defs>
    <style>
      .bg { fill: #FFFFFF; }
      .header { fill: #D32F2F; }
      .header-text { font-family: Arial; font-size: 16px; font-weight: bold; fill: #FFFFFF; }
      .label { font-family: Arial; font-size: 12px; fill: #333333; }
      .table-header { fill: #E0E0E0; font-family: Arial; font-size: 10px; font-weight: bold; }
      .table-row { fill: #FFFFFF; stroke: #EEEEEE; stroke-width: 1; }
      .button { fill: #4CAF50; stroke: none; }
      .button-text { font-family: Arial; font-size: 13px; fill: #FFFFFF; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect class='bg' width='375' height='812'/>

  <!-- Admin Header (Red) -->
  <rect class='header' width='375' height='80'/>
  <text class='header-text' x='187.5' y='50' text-anchor='middle'>Admin Panel</text>
  <text x='20' y='72' font-family='Arial' font-size='12' fill='#FFFFFF'>Admin User</text>

  <!-- Tabs -->
  <rect x='0' y='80' width='187.5' height='40' fill='#D32F2F'/>
  <text x='93.75' y='105' text-anchor='middle' font-family='Arial' font-size='12' font-weight='bold' fill='#FFFFFF'>Submissions</text>
  <rect x='187.5' y='80' width='187.5' height='40' fill='#F0F0F0'/>
  <text x='281.25' y='105' text-anchor='middle' class='label'>Reference Data</text>

  <!-- Title -->
  <text x='20' y='150' font-family='Arial' font-size='16' font-weight='bold'>User Submissions</text>
  <text class='label' x='20' y='170' fill='#666'>Page 1 of 5 | Total: 127</text>

  <!-- Table Header -->
  <rect class='table-header' x='15' y='190' width='60' height='30'/>
  <text x='45' y='210' text-anchor='middle' font-size='10' font-weight='bold'>User</text>

  <rect class='table-header' x='75' y='190' width='90' height='30'/>
  <text x='120' y='210' text-anchor='middle' font-size='10' font-weight='bold'>Title</text>

  <rect class='table-header' x='165' y='190' width='70' height='30'/>
  <text x='200' y='210' text-anchor='middle' font-size='10' font-weight='bold'>Date</text>

  <rect class='table-header' x='235' y='190' width='50' height='30'/>
  <text x='260' y='210' text-anchor='middle' font-size='10' font-weight='bold'>Entities</text>

  <rect class='table-header' x='285' y='190' width='75' height='30'/>
  <text x='322.5' y='210' text-anchor='middle' font-size='10' font-weight='bold'>Duration</text>

  <!-- Row 1 -->
  <rect class='table-row' x='15' y='220' width='345' height='35'/>
  <text class='label' x='25' y='242'>john_doe</text>
  <text class='label' x='85' y='242' font-size='10'>History of...</text>
  <text class='label' x='175' y='242' font-size='10'>Mar 25</text>
  <text class='label' x='245' y='242' font-size='10'>12</text>
  <text class='label' x='295' y='242' font-size='10'>2.3s</text>

  <!-- Row 2 -->
  <rect class='table-row' x='15' y='255' width='345' height='35'/>
  <text class='label' x='25' y='277'>jane_smith</text>
  <text class='label' x='85' y='277' font-size='10'>19th Centur...</text>
  <text class='label' x='175' y='277' font-size='10'>Mar 24</text>
  <text class='label' x='245' y='277' font-size='10'>8</text>
  <text class='label' x='295' y='277' font-size='10'>1.9s</text>

  <!-- Row 3 -->
  <rect class='table-row' x='15' y='290' width='345' height='35'/>
  <text class='label' x='25' y='312'>bob_jones</text>
  <text class='label' x='85' y='312' font-size='10'>Travel Record...</text>
  <text class='label' x='175' y='312' font-size='10'>Mar 20</text>
  <text class='label' x='245' y='312' font-size='10'>15</text>
  <text class='label' x='295' y='312' font-size='10'>3.1s</text>

  <!-- Row 4 -->
  <rect class='table-row' x='15' y='325' width='345' height='35'/>
  <text class='label' x='25' y='347'>alice_w</text>
  <text class='label' x='85' y='347' font-size='10'>European...</text>
  <text class='label' x='175' y='347' font-size='10'>Mar 18</text>
  <text class='label' x='245' y='347' font-size='10'>20</text>
  <text class='label' x='295' y='347' font-size='10'>4.2s</text>

  <!-- Pagination -->
  <text class='label' x='20' y='385' font-size='11'>Pagination:</text>
  <rect x='15' y='395' width='30' height='30' fill='#4CAF50' stroke='none' rx='3'/>
  <text x='30' y='417' text-anchor='middle' font-family='Arial' font-size='12' font-weight='bold' fill='#FFFFFF'>1</text>
  <rect x='50' y='395' width='30' height='30' fill='#F0F0F0' stroke='#CCCCCC' stroke-width='1' rx='3'/>
  <text x='65' y='417' text-anchor='middle' class='label'>2</text>
  <rect x='85' y='395' width='30' height='30' fill='#F0F0F0' stroke='#CCCCCC' stroke-width='1' rx='3'/>
  <text x='100' y='417' text-anchor='middle' class='label'>3</text>

  <!-- View Details Info -->
  <rect x='15' y='450' width='345' height='100' fill='#F9F9F9' stroke='#EEEEEE' stroke-width='1' rx='4'/>
  <text class='label' x='25' y='475' font-size='11' font-weight='bold'>Click a row to view</text>
  <text class='label' x='25' y='495' font-size='11'>detailed submission data</text>
  <text class='label' x='25' y='515' font-size='10'>Text, entities, confidence</text>
  <text class='label' x='25' y='530' font-size='10'>scores and methods</text>

  <!-- View Submission Button -->
  <rect class='button' x='25' y='570' width='325' height='45' rx='4'/>
  <text class='button-text' x='187.5' y='598' text-anchor='middle'>View Submission</text>
</svg>
