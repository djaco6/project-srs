<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 386 546" width="386" height="546">
  <defs>
    <style>
      .class-name { font: bold 15px sans-serif; fill: #1a237e; }
      .section-label { font: bold 12px sans-serif; fill: #555; }
      .attr { font: 13px monospace; fill: #333; }
    </style>
  </defs>

  <!-- Outer box -->
  <rect x="0.5" y="0.5" width="385" height="545" rx="4" ry="4" fill="white" stroke="#333" stroke-width="1.2"/>

  <!-- Header background -->
  <rect x="1" y="1" width="384" height="39" rx="4" ry="4" fill="#E3F2FD" stroke="none"/>
  <rect x="1" y="20" width="384" height="20" fill="#E3F2FD" stroke="none"/>
  <line x1="0.5" y1="40.5" x2="385.5" y2="40.5" stroke="#333" stroke-width="1"/>

  <!-- Header text -->
  <text x="193" y="27" text-anchor="middle" class="class-name">User (CL01)</text>

  <!-- ─── Devise Auth ─── -->
  <text x="193" y="60" text-anchor="middle" class="section-label">--- Devise Auth ---</text>
  <line x1="0.5" y1="68" x2="385.5" y2="68" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4,3"/>

  <text x="16" y="88" class="attr">id: bigint PK</text>
  <text x="16" y="110" class="attr">email: string</text>
  <text x="16" y="132" class="attr">encrypted_password: string</text>
  <text x="16" y="154" class="attr">reset_password_token: string</text>
  <text x="16" y="176" class="attr">reset_password_sent_at: datetime</text>
  <text x="16" y="198" class="attr">remember_created_at: datetime</text>

  <!-- ─── Trackable ─── -->
  <line x1="0.5" y1="212" x2="385.5" y2="212" stroke="#333" stroke-width="0.8"/>
  <text x="193" y="232" text-anchor="middle" class="section-label">--- Trackable ---</text>
  <line x1="0.5" y1="240" x2="385.5" y2="240" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4,3"/>

  <text x="16" y="260" class="attr">sign_in_count: integer</text>
  <text x="16" y="282" class="attr">current_sign_in_at: datetime</text>
  <text x="16" y="304" class="attr">last_sign_in_at: datetime</text>
  <text x="16" y="326" class="attr">current_sign_in_ip: inet</text>
  <text x="16" y="348" class="attr">last_sign_in_ip: inet</text>

  <!-- ─── Application ─── -->
  <line x1="0.5" y1="362" x2="385.5" y2="362" stroke="#333" stroke-width="0.8"/>
  <text x="193" y="382" text-anchor="middle" class="section-label">--- Application ---</text>
  <line x1="0.5" y1="390" x2="385.5" y2="390" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4,3"/>

  <text x="16" y="410" class="attr">role: string</text>
  <text x="16" y="432" class="attr">created_at: datetime</text>
  <text x="16" y="454" class="attr">updated_at: datetime</text>

  <!-- ─── Methods ─── -->
  <line x1="0.5" y1="468" x2="385.5" y2="468" stroke="#333" stroke-width="0.8"/>
  <text x="193" y="488" text-anchor="middle" class="section-label">--- Methods ---</text>
  <line x1="0.5" y1="496" x2="385.5" y2="496" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4,3"/>

  <text x="16" y="516" class="attr">+ authenticate()</text>
  <text x="16" y="538" class="attr">+ admin?()</text>
</svg>