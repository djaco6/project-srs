<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 370" width="440" height="370">
  <defs>
    <style>
      .class-name { font: bold 15px sans-serif; fill: #1B5E20; }
      .class-note { font: italic 11px sans-serif; fill: #555; }
      .attr { font: 13px monospace; fill: #333; }
      .constraint { font: italic 12px monospace; fill: #666; }
    </style>
  </defs>

  <!-- Card outline -->
  <rect x="0.5" y="0.5" width="439" height="369" rx="4" ry="4"
        fill="white" stroke="#333" stroke-width="1"/>

  <!-- Header background -->
  <rect x="0.5" y="0.5" width="439" height="50" rx="4" ry="4"
        fill="#E8F5E9" stroke="none"/>
  <!-- Cover bottom corners of header so only top is rounded -->
  <rect x="0.5" y="30" width="439" height="21" fill="#E8F5E9" stroke="none"/>
  <!-- Header bottom border -->
  <line x1="0.5" y1="50.5" x2="439.5" y2="50.5" stroke="#333" stroke-width="1"/>

  <!-- Header text -->
  <text x="220" y="24" text-anchor="middle" class="class-name">RegionalPopulation (CL08)</text>
  <text x="220" y="42" text-anchor="middle" class="class-note">(seed data, read-only)</text>

  <!-- Attributes -->
  <text x="16" y="74" class="attr">id: bigint PK</text>
  <text x="16" y="96" class="attr">region_name: string</text>
  <text x="16" y="118" class="attr">region_type: string</text>
  <text x="16" y="140" class="attr">parent_region: string</text>
  <text x="16" y="162" class="attr">year: integer</text>

  <!-- Divider -->
  <line x1="16" y1="172" x2="424" y2="172" stroke="#CCC" stroke-width="0.5"/>

  <text x="16" y="192" class="attr">population_estimate: bigint</text>
  <text x="16" y="214" class="attr">gdp_per_capita: float</text>
  <text x="16" y="236" class="attr">estimate_source: string</text>
  <text x="16" y="258" class="attr">confidence_tier: integer (1-4)</text>
  <text x="16" y="280" class="attr">notes: text</text>

  <!-- Divider before constraints -->
  <line x1="0.5" y1="294" x2="439.5" y2="294" stroke="#333" stroke-width="1"/>

  <!-- Constraints section -->
  <text x="16" y="316" class="constraint">UNIQUE(region_name, region_type,</text>
  <text x="16" y="336" class="constraint">       year, estimate_source)</text>
</svg>
