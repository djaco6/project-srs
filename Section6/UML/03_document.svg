<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 680" width="420" height="680">
  <defs>
    <style>
      .class-name { font: bold 15px sans-serif; fill: #1a237e; }
      .section-label { font: bold 12px sans-serif; fill: #555; }
      .attr { font: 13px monospace; fill: #333; }
    </style>
  </defs>

  <!-- Outer box -->
  <rect x="0.5" y="0.5" width="419" height="679" rx="4" ry="4" fill="white" stroke="#333" stroke-width="1.2"/>

  <!-- Header background -->
  <rect x="1" y="1" width="418" height="39" rx="4" ry="4" fill="#E3F2FD" stroke="none"/>
  <rect x="1" y="20" width="418" height="20" fill="#E3F2FD" stroke="none"/>
  <line x1="0.5" y1="40.5" x2="419.5" y2="40.5" stroke="#333" stroke-width="1"/>

  <!-- Header text -->
  <text x="210" y="27" text-anchor="middle" class="class-name">Document (CL03)</text>

  <!-- ─── first divider ─── -->
  <line x1="0.5" y1="48" x2="419.5" y2="48" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4,3"/>

  <text x="16" y="68" class="attr">id: uuid PK</text>
  <text x="16" y="90" class="attr">user_id: bigint FK &#x2192; User</text>
  <text x="16" y="112" class="attr">title: string</text>
  <text x="16" y="134" class="attr">source_type: string</text>
  <text x="16" y="156" class="attr">storage_path: text</text>
  <text x="16" y="178" class="attr">raw_text: text</text>
  <text x="16" y="200" class="attr">status: string</text>
  <text x="16" y="222" class="attr">page_count: integer</text>

  <!-- ─── Audit Trail ─── -->
  <line x1="0.5" y1="236" x2="419.5" y2="236" stroke="#333" stroke-width="0.8"/>
  <text x="210" y="256" text-anchor="middle" class="section-label">--- Audit Trail ---</text>
  <line x1="0.5" y1="264" x2="419.5" y2="264" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4,3"/>

  <text x="16" y="284" class="attr">submitted_ip: inet</text>
  <text x="16" y="306" class="attr">submitted_user_agent: string</text>
  <text x="16" y="328" class="attr">processing_started_at: datetime</text>
  <text x="16" y="350" class="attr">processing_completed_at: datetime</text>
  <text x="16" y="372" class="attr">processing_duration_ms: integer</text>
  <text x="16" y="394" class="attr">error_message: text</text>
  <text x="16" y="416" class="attr">error_class: string</text>
  <text x="16" y="438" class="attr">entity_count: integer</text>
  <text x="16" y="460" class="attr">annotation_count: integer</text>
  <text x="16" y="482" class="attr">last_accessed_at: datetime</text>

  <!-- ─── timestamps divider ─── -->
  <line x1="0.5" y1="496" x2="419.5" y2="496" stroke="#333" stroke-width="0.8"/>
  <line x1="0.5" y1="504" x2="419.5" y2="504" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4,3"/>

  <text x="16" y="524" class="attr">created_at: datetime</text>
  <text x="16" y="546" class="attr">updated_at: datetime</text>

  <!-- ─── Methods ─── -->
  <line x1="0.5" y1="560" x2="419.5" y2="560" stroke="#333" stroke-width="0.8"/>
  <text x="210" y="580" text-anchor="middle" class="section-label">--- Methods ---</text>
  <line x1="0.5" y1="588" x2="419.5" y2="588" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4,3"/>

  <text x="16" y="608" class="attr">+ process!()</text>
  <text x="16" y="630" class="attr">+ ready?()</text>
</svg>