<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 330" width="360" height="330">
  <defs>
    <style>
      .class-name { font: bold 15px sans-serif; fill: #1B5E20; }
      .class-note { font: italic 11px sans-serif; fill: #555; }
      .attr { font: 13px monospace; fill: #333; }
    </style>
  </defs>

  <!-- Card outline -->
  <rect x="0.5" y="0.5" width="359" height="329" rx="4" ry="4"
        fill="white" stroke="#333" stroke-width="1"/>

  <!-- Header background -->
  <rect x="0.5" y="0.5" width="359" height="50" rx="4" ry="4"
        fill="#E8F5E9" stroke="none"/>
  <!-- Cover bottom corners of header so only top is rounded -->
  <rect x="0.5" y="30" width="359" height="21" fill="#E8F5E9" stroke="none"/>
  <!-- Header bottom border -->
  <line x1="0.5" y1="50.5" x2="359.5" y2="50.5" stroke="#333" stroke-width="1"/>

  <!-- Header text -->
  <text x="180" y="24" text-anchor="middle" class="class-name">UrbanPopulation (CL07)</text>
  <text x="180" y="42" text-anchor="middle" class="class-note">(seed data, read-only)</text>

  <!-- Attributes -->
  <text x="16" y="74" class="attr">id: bigint PK</text>
  <text x="16" y="96" class="attr">city: string</text>
  <text x="16" y="118" class="attr">other_name: string</text>
  <text x="16" y="140" class="attr">country: string</text>

  <!-- Divider -->
  <line x1="16" y1="150" x2="344" y2="150" stroke="#CCC" stroke-width="0.5"/>

  <text x="16" y="170" class="attr">location: geography(Point, 4326)</text>
  <text x="16" y="192" class="attr">latitude: float</text>
  <text x="16" y="214" class="attr">longitude: float</text>

  <!-- Divider -->
  <line x1="16" y1="224" x2="344" y2="224" stroke="#CCC" stroke-width="0.5"/>

  <text x="16" y="244" class="attr">certainty: smallint (1-3)</text>
  <text x="16" y="266" class="attr">year: integer</text>
  <text x="16" y="288" class="attr">population: bigint</text>
  <text x="16" y="310" class="attr">city_id: string</text>
</svg>
