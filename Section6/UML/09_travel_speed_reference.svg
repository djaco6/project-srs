<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 230" width="320" height="230">
  <defs>
    <style>
      .class-name { font: bold 15px sans-serif; fill: #1B5E20; }
      .class-note { font: italic 11px sans-serif; fill: #555; }
      .attr { font: 13px monospace; fill: #333; }
    </style>
  </defs>

  <!-- Card outline -->
  <rect x="0.5" y="0.5" width="319" height="229" rx="4" ry="4"
        fill="white" stroke="#333" stroke-width="1"/>

  <!-- Header background -->
  <rect x="0.5" y="0.5" width="319" height="50" rx="4" ry="4"
        fill="#E8F5E9" stroke="none"/>
  <!-- Cover bottom corners of header so only top is rounded -->
  <rect x="0.5" y="30" width="319" height="21" fill="#E8F5E9" stroke="none"/>
  <!-- Header bottom border -->
  <line x1="0.5" y1="50.5" x2="319.5" y2="50.5" stroke="#333" stroke-width="1"/>

  <!-- Header text -->
  <text x="160" y="24" text-anchor="middle" class="class-name">TravelSpeedReference (CL09)</text>
  <text x="160" y="42" text-anchor="middle" class="class-note">(seed data, read-only)</text>

  <!-- Attributes -->
  <text x="16" y="74" class="attr">id: bigint PK</text>
  <text x="16" y="96" class="attr">mode: string</text>
  <text x="16" y="118" class="attr">condition: string</text>

  <!-- Divider -->
  <line x1="16" y1="128" x2="304" y2="128" stroke="#CCC" stroke-width="0.5"/>

  <text x="16" y="148" class="attr">km_per_day_low: float</text>
  <text x="16" y="170" class="attr">km_per_day_mid: float</text>
  <text x="16" y="192" class="attr">km_per_day_high: float</text>
</svg>
